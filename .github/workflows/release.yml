# Publish multi-arch image to GHCR on `v*.*.*` tags.
name: release

"on":
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write
  id-token: write   # required for SBOM / provenance attestations

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (semver tags + latest)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Romestead's dotnet build is x64-only today; arm64 build would
          # succeed but the dotnet runtime can't load the engine. Expand
          # to linux/arm64 once an arm64 server build appears.
          platforms: linux/amd64
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to:   type=gha,mode=max
