# Lint + smoke-test on every push / PR.
# "on" is quoted because YAML 1.1 reads bare `on` as boolean true — yamllint's
# default truthy rule would otherwise complain on every workflow file.
name: ci

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -e SC1090 -e SC1091
        with:
          scandir: ./scripts

      - name: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
          config: .hadolint.yaml

      - name: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_data: |
            extends: default
            rules:
              line-length: disable
              document-start: disable
              truthy: { check-keys: false }
              braces:  { max-spaces-inside: 1 }
              colons:  { max-spaces-after: -1 }
              commas:  { max-spaces-after: -1 }
              indentation: { spaces: 2, indent-sequences: consistent }

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: romestead-docker:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          platforms: linux/amd64

      - name: Smoke test — CLI surface
        run: |
          # ENTRYPOINT is `tini -- rs`, so the argument is the subcommand —
          # `rs` is already implicit. `docker run image rs version` would
          # double up and dispatch the literal string "rs" as a subcommand.
          docker run --rm romestead-docker:ci version
          docker run --rm romestead-docker:ci help
