apiVersion: batch/v1
kind: CronJob
metadata:
  name: romestead-backup
  labels:
    app.kubernetes.io/name: romestead
    app.kubernetes.io/component: backup
spec:
  # 03:17 UTC every day — odd minute to dodge cron herd-thundering on a
  # shared cluster. Adjust to your maintenance window.
  schedule: "17 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: romestead
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 1000
            runAsGroup: 1001
            fsGroup: 1001
          containers:
            - name: backup
              image: ghcr.io/0xkernel/romestead-docker:latest
              imagePullPolicy: IfNotPresent
              args: ["backup"]
              envFrom:
                - secretRef: { name: romestead-config }
              volumeMounts:
                - { name: data, mountPath: /mnt/steam }
              resources:
                requests: { cpu: "100m", memory: "128Mi" }
                limits: { cpu: "1", memory: "512Mi" }
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: romestead-data
