apiVersion: apps/v1
kind: Deployment
metadata:
  name: romestead-server
  labels:
    app.kubernetes.io/name: romestead
    app.kubernetes.io/component: server
spec:
  replicas: 1
  # Recreate, not RollingUpdate — only one process at a time can hold the
  # save dir and bind the UDP port.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: romestead
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: romestead
        app.kubernetes.io/component: server
    spec:
      # Romestead is UDP — hostNetwork avoids the CNI NAT layer that often
      # mangles A2S replies on community matchmaking lists.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Give the engine room to flush worlds on SIGTERM. The container's
      # internal stop_grace + tini handle the actual graceful shutdown.
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsUser: 1000
        runAsGroup: 1001
        fsGroup: 1001
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1001 /mnt/steam"]
          volumeMounts:
            - { name: data, mountPath: /mnt/steam }
          securityContext:
            runAsUser: 0
            runAsGroup: 0
      containers:
        - name: server
          image: ghcr.io/0xkernel/romestead-docker:latest
          imagePullPolicy: IfNotPresent
          args: ["run"]
          envFrom:
            - secretRef: { name: romestead-config }
          ports:
            - name: game
              containerPort: 8050
              hostPort: 8050
              protocol: UDP
          volumeMounts:
            - { name: data, mountPath: /mnt/steam }
            - { name: tmp,  mountPath: /tmp       }
          securityContext:
            seccompProfile:
              type: Unconfined
            capabilities:
              add: ["SYS_NICE"]   # renice the engine thread
          # Cold boot includes a depot validate; give it real headroom before
          # liveness starts probing. periodSeconds*failureThreshold = 5 min.
          startupProbe:
            exec:
              command: ["python3", "/opt/healthcheck.py"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["python3", "/opt/healthcheck.py"]
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["python3", "/opt/healthcheck.py"]
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 2
          resources:
            requests: { cpu: "1",   memory: "2Gi" }
            limits:   { cpu: "4",   memory: "6Gi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: romestead-data
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
