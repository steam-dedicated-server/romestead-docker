# Template — copy to secret.yaml and base64-encode each value, OR feed plain
# values into stringData (kubectl encodes them for you):
#
#   cp secret.example.yaml secret.yaml
#   # edit secret.yaml, replace stringData values
#   kubectl apply -f secret.yaml
#
# secret.yaml is gitignored. Never commit a populated Secret.
apiVersion: v1
kind: Secret
metadata:
  name: romestead-config
  labels:
    app.kubernetes.io/name: romestead
type: Opaque
stringData:
  # ── Required ──
  PASSWORD: "changeme"

  # ── World ──
  AUTO_START_WORLD_NAME: ""
  AUTO_CREATE_AND_LOAD_WORLD: "true"
  AUTO_CREATE_WORLD_SIZE: "1"
  AUTO_CREATE_WORLD_SEED: "null"

  # ── Slots + cheats ──
  PORT: "8050"
  MAX_PLAYERS: "8"
  ENABLE_CHEATS: "false"

  # ── Steam auth (only if anonymous breaks) ──
  STEAM_USER: "anonymous"
  # STEAM_PASSWORD: ""
  # STEAM_GUARD_CODE: ""

  # ── Branch + lifecycle ──
  BRANCH: "public"
  UPDATE_ON_START: "true"
  STOP_GRACE_SECONDS: "30"
  GENERATE_SETTINGS: "true"
